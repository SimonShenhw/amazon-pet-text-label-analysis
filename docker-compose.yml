# Stage 1 & 3 (PaddleOCR) run in this CPU container — no GPU passthrough needed.
# Stage 2 (Donut) runs on the HOST python (torch cu130 on the 5090). See README.
services:
  paddle:
    build:
      context: .
      dockerfile: docker/Dockerfile.paddle
    image: xn-paddle-cpu
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./src:/app/src
    # Usage:
    #   docker compose build paddle
    #   docker compose run --rm paddle python -m src.ingest.ingest
    #   docker compose run --rm paddle python -m src.stage1_paddle.run_ocr
    #   docker compose run --rm paddle python -m src.stage3_thumbnail.readability
    command: ["python", "-m", "src.stage1_paddle.run_ocr"]
